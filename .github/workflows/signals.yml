name: Analyse crypto et notification Telegram

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {} # permet de le lancer manuellement depuis l'onglet Actions

permissions:
  contents: write # nécessaire pour committer state.json automatiquement

jobs:
  analyse:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code du repo
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Lancer l'analyse
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node analyze.mjs

      - name: Sauvegarder l'état (anti-spam) dans le repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          git diff --staged --quiet || git commit -m "Mise à jour état des signaux"
          git push
